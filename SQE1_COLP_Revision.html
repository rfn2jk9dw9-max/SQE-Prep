// ── Helpers ────────────────────────────────────────────────────────────────
function parseDate(s){ const[y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function toYMD(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDate(s){
  if(!s) return '—';
  return parseDate(s).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function todayYMD(){ return toYMD(new Date()); }

function computeRevisionDate(colpDateStr){
  const d = parseDate(colpDateStr);
  d.setDate(d.getDate() + MIN_GAP);
  let safety = 0;
  while(safety++ < 90){
    if(d > SCHED_END) return null;
    const s = toYMD(d);
    if(d.getDay() === 6){ d.setDate(d.getDate()+1); continue; } // skip Saturday
    if(COLP_BUSY.has(s)) { d.setDate(d.getDate()+1); continue; } // skip COLP day
    break;
  }
  if(d > SCHED_END) return null;
  return toYMD(d);
}

  CONT:'#60a5fa', TORT:'#f87171', COND:'#34d399', LAND:'#fb923c',
  CRML:'#f472b6', TRUS:'#a78bfa', BUS:'#fbbf24',  DISP:'#38bdf8',
  CRMP:'#fb7185', SERV:'#4ade80', SYS:'#e879f9',  PROP:'#f59e0b',
  WILL:'#86efac',
};
function codeColour(code){
  const p = code.match(/^[A-Z]+/)?.[0]||'';
  return SUBJECT_COLOUR[p]||'#fff';
}

// ── Persistence ────────────────────────────────────────────────────────────

function saveDone(s){ localStorage.setItem(STORE_KEY, JSON.stringify([...s])); }

  const colpDate = SEED_DATES[m.code] || null;
  const revDate  = colpDate ? computeRevisionDate(colpDate) : null;
  return { ...m, colpDate, revDate };
});

// ── Render ─────────────────────────────────────────────────────────────────
let activeFilter = 'all';

function getStatus(item){
  if(done.has(item.code)) return 'done';
  if(!item.revDate) return 'nodate';
  const t = todayYMD();
  if(item.revDate < t) return 'overdue';
  if(item.revDate === t) return 'today';
  return 'upcoming';
}

function render(){
  const cards = document.getElementById('cards');
  cards.innerHTML = '';

  const doneCount = schedule.filter(m=>done.has(m.code)).length;
  const pct = Math.round(doneCount/schedule.length*100);
  document.getElementById('pbFill').style.width = pct+'%';
  document.getElementById('pbLabel').textContent =
    doneCount+' of '+schedule.length+' topics revised ('+pct+'%)';

  const filtered = schedule.filter(item=>{
    if(activeFilter==='all') return true;
    return getStatus(item)===activeFilter;
  });

  if(!filtered.length){
    cards.innerHTML='<div class="empty">No items in this category.</div>';
    return;
  }

  filtered.forEach(item=>{
    const s = getStatus(item);
    const colour = codeColour(item.code);
    const badgeText = {
      done:     '✓ Done',
      today:    '📅 Today',
      overdue:  '⚠ Overdue',
      upcoming: fmtDate(item.revDate),
      nodate:   'After 14 Dec',
    }[s];

    const el = document.createElement('div');
    el.className = 'card s-'+s;
    el.innerHTML =
      '<div class="card-head">'+
        '<span class="card-code" style="color:'+colour+'">'+item.code+'</span>'+
        '<span class="card-title">'+item.title+'</span>'+
        '<span class="card-check">'+(done.has(item.code)?'✓':'')+'</span>'+
        '<span class="badge">'+badgeText+'</span>'+
      '</div>'+
      '<div class="card-dates">'+
        '<span>📚 COLP: '+fmtDate(item.colpDate)+'</span>'+
        (item.revDate
          ? '<span>🔁 Revise: '+fmtDate(item.revDate)+'</span>'
          : '<span>🔁 No revision slot before 14 Dec</span>')+
      '</div>';
    el.addEventListener('click', ()=>{
      if(done.has(item.code)) done.delete(item.code);
      else done.add(item.code);
      saveDone(done);
      render();
    });
    cards.appendChild(el);
  });
}

// ── Filter buttons ─────────────────────────────────────────────────────────
document.getElementById('filters').addEventListener('click', e=>{
  const btn = e.target.closest('[data-filter]');
  if(!btn) return;
  activeFilter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

render();
</script>
</body>
</html>
