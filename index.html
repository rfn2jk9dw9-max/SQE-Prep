<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SQE1 Prep · Ghita Bennis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:linear-gradient(135deg,#0c1024 0%,#1e3a5f 100%);
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:32px 28px;width:100%;max-width:380px;
  backdrop-filter:blur(12px);text-align:center}
.logo{font-size:36px;font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:4px}
.logo em{font-style:normal;color:#60a5fa}
.tagline{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.8px;
  text-transform:uppercase;margin-bottom:36px}
.btn{display:block;width:100%;padding:18px 20px;border-radius:14px;
  text-decoration:none;margin-bottom:14px;transition:transform .15s,opacity .15s;
  text-align:left;position:relative}
.btn:hover{transform:translateY(-2px);opacity:.92}
.btn:active{transform:translateY(0)}
.btn-icon{font-size:28px;margin-bottom:8px;display:block}
.btn-title{font-size:17px;font-weight:800;color:#fff;display:block;margin-bottom:3px}
.btn-desc{font-size:12px;color:rgba(255,255,255,.6);display:block;line-height:1.4}
.btn-arr{position:absolute;right:18px;top:50%;transform:translateY(-50%);
  font-size:20px;color:rgba(255,255,255,.4)}
.btn-exam{background:linear-gradient(135deg,#6366f1,#8b5cf6);
  box-shadow:0 8px 32px rgba(99,102,241,.35)}
.btn-guide{background:linear-gradient(135deg,#0e7490,#0891b2);
  box-shadow:0 8px 32px rgba(14,116,144,.35)}
.footer{margin-top:24px;font-size:11px;color:rgba(255,255,255,.2);text-align:center;line-height:1.7}
</style>
</head>
<body>
<div class="card">
  <div class="logo">SQE<em>1</em></div>
  <div class="tagline">COLP 2025/26 · Ghita Bennis</div>

  <a href="SQE1_MockExam_Standalone.html" class="btn btn-exam">
    <span class="btn-icon">📝</span>
    <span class="btn-title">Mock Exam</span>
    <span class="btn-desc">437 questions · FLK1 & FLK2 · Timed exam mode</span>
    <span class="btn-arr">›</span>
  </a>

  <a href="SQE1_HighYield_Standalone.html" class="btn btn-guide">
    <span class="btn-icon">📖</span>
    <span class="btn-title">Revision Guide</span>
    <span class="btn-desc">92 chapters · Flashcards · All 13 subjects</span>
    <span class="btn-arr">›</span>
  </a>

  <div class="footer">Scores save automatically on this device<br>No account needed</div>
</div>
</body>
</html>
